services:

  #Laravel Application (PHP 8.2-FPM)
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: concert_app
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    networks:
      - concert_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  #Nginx Web Server 
  web:
    image: nginx:alpine
    container_name: concert_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - concert_net
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  #MySQL Database (v8.0)
  mysql:
    image: mysql:8.0
    container_name: concert_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-concert_booking}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-sail}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - concert_net
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - "127.0.0.1"
        - -u
        - "${DB_USERNAME:-sail}"
        - "-p${DB_PASSWORD:-password}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  #Redis for High-Traffic Locking
  redis:
    image: redis:alpine
    container_name: concert_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - concert_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  concert_net:
    driver: bridge

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
